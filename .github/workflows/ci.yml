name: CI - Build & Push FE Docker Image

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened

    workflow_dispatch:

    schedule:
        - cron: '0 3 * * 1'

    release:
        types:
            - published

    pull_request_review:
        types:
            - submitted

env:
    HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
    IMAGE_NAME: 3016_maintq-fe #a3016_maintq-fe
    K8S_NAMESPACE: skala3-ai1
    DEPLOYMENT_NAME: sk016-maintq-fe
    CONTAINER_NAME: sk016-maintq-fe

jobs:
    ci:
        name: Build frontend
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: FE/package-lock.json

            - name: Install dependencies
              working-directory: ./FE
              run: npm ci

            - name: Build frontend
              working-directory: ./FE
              run: npm run build

    docker:
        name: Build & Push to Harbor
        runs-on: ubuntu-latest
        needs: ci
        if: github.event_name != 'pull_request'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Harbor registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.HARBOR_REGISTRY }}
                  username: ${{ secrets.HARBOR_USERNAME }}
                  password: ${{ secrets.HARBOR_PASSWORD }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=,format=short
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ./FE
                  file: ./FE/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
    deploy: ##  2026.03.25 deploy job 추가
        name: Deploy to Kubernetes
        runs-on: ubuntu-latest
        needs: docker
        steps:
            - name: Set up kubectl
              uses: azure/setup-kubectl@v4

            - name: Set kubeconfig
              run: |
                  mkdir -p ~/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

            - name: Update deployment image
              run: |
                  kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
                      ${{ env.CONTAINER_NAME }}=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest \
                      -n ${{ env.K8S_NAMESPACE }}

            - name: Check rollout status
              run: |
                  kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }}
